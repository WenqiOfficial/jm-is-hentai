<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="referrer" content="no-referrer">
  <meta name="description" content="Hentai车站 — JMComic 编号检索工具，快速查询漫画信息">
  <title>Hentai车站</title>
  <link rel="icon" href="./favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://fonts.font.im/css2?family=Fredoka:wght@600&family=M+PLUS+Rounded+1c:wght@400;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.snrat.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./src/toast.css">
  <link rel="stylesheet" href="./src/footer.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="mask-active initial-load">
  <!-- 全局加载遮罩 (Global Loading Mask) -->
  <div class="global-mask" id="global-mask"></div>

  <div class="background-container" id="bg-container">
    <!-- CSS fallback gradient (hidden automatically when WebGL initializes) -->
    <div class="fluid-gradient" id="fluid-gradient"></div>
  </div>

  <header class="header" role="banner">
    <div class="header-left">
      <div class="menu-toggle">
        <div class="header-right">

          <button id="settings-btn" class="icon-btn"
                data-i18n-title="action.settings"
                title="设置"
                aria-label="打开设置菜单"
                aria-expanded="false"
                aria-controls="settings-panel">
          <i class="fa-solid fa-bars"></i>
        </button>
        </div>
        <div id="settings-panel" class="settings-panel is-hidden"
             role="menu"
             aria-label="数据源设置">
          <div class="settings-section">
            <h4 data-i18n="settings.datasource"><i class="fa-solid fa-server"></i> 数据源设置</h4>
            <div class="glass-pill-group">
              <div class="jelly-tracker"></div>
              <label class="glass-pill">
                <input type="radio" name="datasource" value="api" checked>
                <span data-i18n="settings.ds_api">API 代理</span>
              </label>
              <label class="glass-pill">
                <input type="radio" name="datasource" value="frontend">
                <span data-i18n="settings.ds_frontend">前端直连</span>
              </label>
            </div>
          </div>
          
          <hr class="settings-divider">

          <div class="settings-section">
            <h4 data-i18n="settings.language"><i class="fa-solid fa-earth-asia"></i> 语言设置</h4>
            <div class="glass-pill-group">
              <div class="jelly-tracker"></div>
              <label class="glass-pill">
                <input type="radio" name="language" value="auto" checked>
                <span data-i18n="settings.lang_auto">自动</span>
              </label>
              <label class="glass-pill">
                <input type="radio" name="language" value="zh">
                <span>中文</span>
              </label>
              <label class="glass-pill">
                <input type="radio" name="language" value="ja">
                <span>日本語</span>
              </label>
              <label class="glass-pill">
                <input type="radio" name="language" value="en">
                <span>EN</span>
              </label>
            </div>
          </div>

          <hr class="settings-divider">

          <div class="settings-section settings-row">
            <h4 data-i18n="settings.auto_blur"><i class="fa-solid fa-eye-slash"></i> 自动模糊 NSFW 封面</h4>
            <label class="glass-switch">
              <input type="checkbox" id="nsfw-blur-toggle" checked>
              <span class="switch-slider"></span>
            </label>
          </div>

          <hr class="settings-divider">

          <button id="update-tags-btn" class="jelly-btn small" aria-label="更新标签库">
            <i class="fa-solid fa-rotate"></i> <span data-i18n="settings.update_tags">更新标签库</span>
          </button>
        </div>
      </div>
      <div class="logo" id="main-logo">
        <img src="./image/icon-jmeh.png" alt="logo" class="logo-img" draggable="false">
        <span id="logo-text-container" class="logo-text-gradient">
          <span class="logo-letter">H</span>
          <span class="logo-letter">e</span>
          <span class="logo-letter">n</span>
          <span class="logo-letter">t</span>
          <span class="logo-letter">a</span>
          <span class="logo-letter">i</span>
          <span class="logo-letter">车</span>
          <span class="logo-letter">站</span>
        </span>
      </div>
    </div>
  </header>

  <main class="container" role="main">
    <div class="visual-area">
      <div id="visual-content" class="visual-content placeholder">
        <!-- 看板娘或封面占位 -->
        <span><i class="fa-solid fa-image"></i> <span data-i18n="visual.waiting">等待检索...</span></span>
      </div>
    </div>

    <div class="operation-area">
      <div class="float-wrapper">
        <div class="card glass-card">
          <h1 class="card-title" data-i18n="search.title">检索你的车牌号</h1>
          
          <div class="platform-toggle" role="radiogroup" aria-label="搜索平台">
            <div class="jelly-tracker"></div>
            <label class="platform-btn active">
              <input type="radio" name="platform" value="jm" checked>
              <i class="fa-solid fa-book-open"></i> <span data-i18n="platform.jm">禁漫</span>
            </label>
            <label class="platform-btn">
              <input type="radio" name="platform" value="eh">
              <i class="fa-solid fa-paw"></i> E-Hentai
            </label>
          </div>

          <div class="input-group">
            <input type="text" id="jm-id-input"
                   data-i18n-placeholder="search.input_jm"
                   placeholder="输入 JMComic 编号..."
                   class="rounded-input"
                   aria-label="JMComic 编号输入" />
            <button id="search-btn" class="jelly-btn" aria-label="搜索漫画">
              <i class="fa-solid fa-magnifying-glass"></i> <span data-i18n="search.button">检索</span>
            </button>
          </div>

          <div id="result-container" class="result-container" style="display: none;">
            <div class="result-stack">
              <div class="loading fade-element" id="loading-indicator" style="display: none;">
                <div class="spinner"></div>
                <p data-i18n="search.loading">正在云端寻找...</p>
              </div>

              <div class="error-msg fade-element" id="error-msg" style="display: none;"></div>

              <div class="comic-info fade-element" id="comic-info" style="display: none;">
                <h2 id="comic-title" class="comic-title"></h2>
                <div class="comic-meta">
                  <span id="comic-author"></span>
                  <div id="comic-tags" class="tag-cloud" role="list" aria-label="漫画标签"></div>
                </div>
                <div class="actions">
                  <a href="#" id="jm-link" target="_blank" rel="noopener"
                     class="jelly-btn alt"
                     aria-label="前往网站阅读">
                    <i class="fa-solid fa-book-open"></i> <span data-i18n="comic.read_jm">前往 JMComic</span>
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Transfer Panel (换乘) — appears after successful search -->
    <div class="transfer-area" id="transfer-area" style="display: none;">
      <div class="float-wrapper transfer-float">
        <div class="card glass-card" id="transfer-card">
          <h2 class="card-title"><i class="fa-solid fa-shuffle"></i> <span data-i18n="transfer.title">换乘</span></h2>

          <div class="transfer-tabs" id="transfer-tabs" role="tablist" aria-label="换乘平台">
            <!-- Tabs generated dynamically by JS -->
          </div>

          <div class="transfer-search-group">
            <input type="text" id="transfer-keyword-input"
                   data-i18n-placeholder="transfer.input_keyword"
                   placeholder="修改检索词..."
                   class="rounded-input small-input"
                   aria-label="换乘检索词修改" />
            <button id="transfer-search-btn" class="jelly-btn alt small-btn" aria-label="重新模糊检索">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>

          <div class="transfer-content" id="transfer-content">
            <div class="transfer-loading fade-element" id="transfer-loading" style="display: none;">
              <div class="spinner"></div>
              <p data-i18n="transfer.loading">正在模糊检索...</p>
            </div>

            <div class="transfer-empty fade-element" id="transfer-empty" style="display: none;">
              <i class="fa-solid fa-cloud-moon"></i>
              <p data-i18n="transfer.empty">暂无匹配结果</p>
            </div>

            <div class="transfer-error fade-element" id="transfer-error" style="display: none;">
              <i class="fa-solid fa-triangle-exclamation"></i>
              <p id="transfer-error-msg" data-i18n="transfer.error_default">请求失败</p>
            </div>

            <div class="transfer-coming-soon fade-element" id="transfer-coming-soon" style="display: none;">
              <i class="fa-solid fa-clock"></i>
              <p data-i18n="transfer.coming_soon">即将支持，敬请期待</p>
            </div>

            <div class="transfer-results fade-element" id="transfer-results" style="display: none;">
              <!-- Results rendered by JS -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Rolling Footer -->
  <footer class="footer" role="contentinfo" id="app-footer">
    <p id="footer-text-container"></p>
  </footer>

  <script src="https://cdnjs.snrat.com/ajax/libs/node-vibrant/3.1.6/vibrant.min.js"></script>
  <!-- OpenCC for Traditional to Simplified Tag Conversion -->
  <script src="https://cdn.jsdmirror.com/npm/opencc-js/dist/umd/t2cn.js"></script>
  <script type="module" src="./src/main.js"></script>
  <script type="module" src="./src/footer.js"></script>
</body>
</html>
